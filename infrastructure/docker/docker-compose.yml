# Full Local Development Stack
# Run: docker-compose up -d

version: '3.8'

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: election_postgres
    environment:
      POSTGRES_DB: election_audit
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d election_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: election_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: election_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://audit_user:audit_pass@postgres:5432/election_audit
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      JWT_SECRET_KEY: docker-dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads

  # --- Next.js Frontend ---
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: election_frontend
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # --- NGINX Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: election_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  upload_data:
