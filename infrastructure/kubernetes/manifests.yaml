apiVersion: v1
kind: Namespace
metadata:
  name: election-audit
  labels:
    app: election-audit
---
# --- Backend Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: election-audit
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: election-audit/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: election-audit
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# --- Frontend Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: election-audit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: election-audit/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_BASE_URL
              value: "http://backend-svc:8000/api/v1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: election-audit
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
# --- PostgreSQL ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: election-audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: election-audit
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: election-audit
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
# --- Redis ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: election-audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: election-audit
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# --- Ingress ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: election-audit-ingress
  namespace: election-audit
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - audit.election.gov
      secretName: election-audit-tls
  rules:
    - host: audit.election.gov
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
---
# --- Secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: election-audit
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://audit_user:CHANGEME@postgres-svc:5432/election_audit"
  REDIS_URL: "redis://redis-svc:6379/0"
  JWT_SECRET_KEY: "CHANGE-THIS-PRODUCTION-SECRET-KEY"
  CORS_ORIGINS: "https://audit.election.gov"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: election-audit
type: Opaque
stringData:
  POSTGRES_DB: election_audit
  POSTGRES_USER: audit_user
  POSTGRES_PASSWORD: CHANGEME
