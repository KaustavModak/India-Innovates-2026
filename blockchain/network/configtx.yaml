# =============================================================
# Hyperledger Fabric Network Configuration
# configtx.yaml - Channel and organization configuration
# =============================================================

Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/election-audit.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &ElectionOrg1
    Name: ElectionOrg1MSP
    ID: ElectionOrg1MSP
    MSPDir: crypto-config/peerOrganizations/org1.election-audit.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ElectionOrg1MSP.admin', 'ElectionOrg1MSP.peer', 'ElectionOrg1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('ElectionOrg1MSP.admin', 'ElectionOrg1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('ElectionOrg1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('ElectionOrg1MSP.peer')"
    AnchorPeers:
      - Host: peer0.org1.election-audit.com
        Port: 7051

  - &ElectionOrg2
    Name: ElectionOrg2MSP
    ID: ElectionOrg2MSP
    MSPDir: crypto-config/peerOrganizations/org2.election-audit.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('ElectionOrg2MSP.admin', 'ElectionOrg2MSP.peer', 'ElectionOrg2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('ElectionOrg2MSP.admin', 'ElectionOrg2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('ElectionOrg2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('ElectionOrg2MSP.peer')"
    AnchorPeers:
      - Host: peer0.org2.election-audit.com
        Port: 9051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.election-audit.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      - Host: orderer.election-audit.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/election-audit.com/orderers/orderer.election-audit.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/election-audit.com/orderers/orderer.election-audit.com/tls/server.crt
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  ElectionAuditOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
    Consortiums:
      ElectionConsortium:
        Organizations:
          - *ElectionOrg1
          - *ElectionOrg2

  ElectionChannel:
    Consortium: ElectionConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *ElectionOrg1
        - *ElectionOrg2
