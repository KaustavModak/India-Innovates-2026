# =============================================================
# Hyperledger Fabric Crypto Config
# Defines the certificate authorities and identities
# =============================================================

OrdererOrgs:
  - Name: Orderer
    Domain: election-audit.com
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer
        SANS:
          - localhost

PeerOrgs:
  - Name: ElectionOrg1
    Domain: org1.election-audit.com
    EnableNodeOUs: true
    Template:
      Count: 2
      SANS:
        - localhost
    Users:
      Count: 1

  - Name: ElectionOrg2
    Domain: org2.election-audit.com
    EnableNodeOUs: true
    Template:
      Count: 2
      SANS:
        - localhost
    Users:
      Count: 1
