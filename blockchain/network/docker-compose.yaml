# =============================================================
# Hyperledger Fabric Network - Docker Compose
# Defines: Orderer, 2 Peers, 2 CAs, CouchDB
# =============================================================

version: '3.7'

networks:
  election_network:
    name: election_fabric_network

volumes:
  orderer.election-audit.com:
  peer0.org1.election-audit.com:
  peer0.org2.election-audit.com:

services:
  # --- Certificate Authority: Org1 ---
  ca.org1.election-audit.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca_org1
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/org1.election-audit.com/ca/:/etc/hyperledger/fabric-ca-server
    networks:
      - election_network

  # --- Certificate Authority: Org2 ---
  ca.org2.election-audit.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca_org2
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/org2.election-audit.com/ca/:/etc/hyperledger/fabric-ca-server
    networks:
      - election_network

  # --- Orderer ---
  orderer.election-audit.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer_election
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/election-audit.com/orderers/orderer.election-audit.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/election-audit.com/orderers/orderer.election-audit.com/tls/:/var/hyperledger/orderer/tls
      - orderer.election-audit.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
    networks:
      - election_network

  # --- Peer0: Org1 ---
  peer0.org1.election-audit.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0_org1
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_ID=peer0.org1.election-audit.com
      - CORE_PEER_ADDRESS=peer0.org1.election-audit.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.election-audit.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.election-audit.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.election-audit.com:7051
      - CORE_PEER_LOCALMSPID=ElectionOrg1MSP
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/org1.election-audit.com/peers/peer0.org1.election-audit.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org1.election-audit.com/peers/peer0.org1.election-audit.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org1.election-audit.com:/var/hyperledger/production
    ports:
      - "7051:7051"
    depends_on:
      - couchdb0
    networks:
      - election_network

  # --- Peer0: Org2 ---
  peer0.org2.election-audit.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0_org2
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_ID=peer0.org2.election-audit.com
      - CORE_PEER_ADDRESS=peer0.org2.election-audit.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.election-audit.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.election-audit.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.election-audit.com:9051
      - CORE_PEER_LOCALMSPID=ElectionOrg2MSP
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/org2.election-audit.com/peers/peer0.org2.election-audit.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org2.election-audit.com/peers/peer0.org2.election-audit.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org2.election-audit.com:/var/hyperledger/production
    ports:
      - "9051:9051"
    depends_on:
      - couchdb1
    networks:
      - election_network

  # --- CouchDB for Org1 ---
  couchdb0:
    image: couchdb:3.3
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - election_network

  # --- CouchDB for Org2 ---
  couchdb1:
    image: couchdb:3.3
    container_name: couchdb1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    networks:
      - election_network
